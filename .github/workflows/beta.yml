name: Build Testing

on:
  push:
    branches:
      - main

# 同一分支的多次推送，取消旧的 workflow，但每个 job 内部的发布步骤使用 group 防并发
concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  EASYTIER_VERSION: '2.5.0'

jobs:
  # ===== 构建前端 =====
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: webpage/package-lock.json

      - name: Install dependencies
        working-directory: webpage
        run: npm ci

      - name: Build webpage
        working-directory: webpage
        run: npm run build

      - name: Upload webpage artifact
        uses: actions/upload-artifact@v4
        with:
          name: webpage-dist
          path: backend/embed/dist/
          retention-days: 1

  # ===== 下载 EasyTier 二进制 =====
  download-easytier:
    name: Download EasyTier (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            bin: easytier-core
            ext: zip
          - os: linux
            arch: aarch64
            bin: easytier-core
            ext: zip
          - os: windows
            arch: x86_64
            bin: easytier-core.exe
            ext: zip
          - os: windows
            arch: arm64
            bin: easytier-core.exe
            ext: zip
          - os: macos
            arch: x86_64
            bin: easytier-core
            ext: zip
          - os: macos
            arch: aarch64
            bin: easytier-core
            ext: zip
    steps:
      - name: Download EasyTier binary
        run: |
          VERSION="${{ env.EASYTIER_VERSION }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          EXT="${{ matrix.ext }}"
          BIN="${{ matrix.bin }}"
          BASE_URL="https://github.com/EasyTier/EasyTier/releases/download/v${VERSION}"
          ARCHIVE="easytier-${OS}-${ARCH}-v${VERSION}.${EXT}"

          echo "Downloading: ${BASE_URL}/${ARCHIVE}"
          curl -fsSL --retry 3 --retry-delay 5 "${BASE_URL}/${ARCHIVE}" -o "easytier.${EXT}"

          unzip -j "easytier.zip" "*/${BIN}" -d ./ 2>/dev/null || \
          unzip -j "easytier.zip" "${BIN}" -d ./ 2>/dev/null || \
          (unzip "easytier.zip" && find . -name "${BIN}" ! -path "./easytier.zip" -exec cp {} ./ \;)
          chmod +x "${BIN}" 2>/dev/null || true

          ls -la "${BIN}"
          echo "EasyTier ${VERSION} for ${OS}-${ARCH} downloaded successfully"

      - name: Upload EasyTier artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytier-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.bin }}
          retention-days: 1

  # ===== 构建后端（Linux / Windows 交叉编译）=====
  build-linux-windows:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [build-frontend, download-easytier]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            et_os: linux
            et_arch: x86_64
            et_bin: easytier-core
            cc: gcc
            output: netpanel
            pkg_ext: tar.gz
          - goos: linux
            goarch: arm64
            et_os: linux
            et_arch: aarch64
            et_bin: easytier-core
            cc: aarch64-linux-gnu-gcc
            output: netpanel
            pkg_ext: tar.gz
          - goos: windows
            goarch: amd64
            et_os: windows
            et_arch: x86_64
            et_bin: easytier-core.exe
            cc: x86_64-w64-mingw32-gcc
            output: netpanel.exe
            pkg_ext: zip
          - goos: windows
            goarch: arm64
            et_os: windows
            et_arch: arm64
            et_bin: easytier-core.exe
            cc: aarch64-w64-mingw32-gcc
            output: netpanel.exe
            pkg_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download webpage dist
        uses: actions/download-artifact@v4
        with:
          name: webpage-dist
          path: backend/embed/dist/

      - name: Download EasyTier binary
        uses: actions/download-artifact@v4
        with:
          name: easytier-${{ matrix.et_os }}-${{ matrix.et_arch }}
          path: easytier-bin/

      - name: Install cross-compile toolchains
        run: |
          sudo apt-get update -qq
          PKGS="gcc"
          if [ "${{ matrix.goarch }}" = "arm64" ] && [ "${{ matrix.goos }}" = "linux" ]; then
            PKGS="${PKGS} gcc-aarch64-linux-gnu"
          fi
          if [ "${{ matrix.goos }}" = "windows" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            PKGS="${PKGS} gcc-mingw-w64-x86-64"
          fi
          if [ "${{ matrix.goos }}" = "windows" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            PKGS="${PKGS} gcc-mingw-w64"
            sudo apt-get install -y ${PKGS} || true
            LLVM_MINGW_VER="20231128"
            curl -fsSL "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VER}/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64.tar.xz" \
              -o /tmp/llvm-mingw.tar.xz
            sudo tar -xJf /tmp/llvm-mingw.tar.xz -C /opt/
            sudo ln -sf /opt/llvm-mingw-${LLVM_MINGW_VER}-ucrt-ubuntu-20.04-x86_64/bin/aarch64-w64-mingw32-gcc \
              /usr/local/bin/aarch64-w64-mingw32-gcc
            exit 0
          fi
          sudo apt-get install -y ${PKGS}

      - name: Tidy Go modules
        working-directory: backend
        run: GONOSUMCHECK=* GOFLAGS=-mod=mod go mod tidy

      - name: Regenerate .syso for Windows ARM64
        if: matrix.goos == 'windows' && matrix.goarch == 'arm64'
        working-directory: backend
        run: |
          echo "Regenerating .syso with llvm-mingw windres for ARM64..."
          /opt/llvm-mingw-20231128-ucrt-ubuntu-20.04-x86_64/bin/aarch64-w64-mingw32-windres \
            netpanel.rc -o netpanel_windows_arm64.syso
          echo "Done. File info:"
          file netpanel_windows_arm64.syso || true
          ls -la netpanel_windows_arm64.syso

      - name: Build backend
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          VERSION="beta-$(echo ${{ github.sha }} | cut -c1-7)"
          go build \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME}" \
            -o ../dist/${{ matrix.output }} .

      - name: Prepare release package
        run: |
          PKG_NAME="netpanel-${{ matrix.goos }}-${{ matrix.goarch }}"
          PKG_DIR="release/${PKG_NAME}"
          mkdir -p "${PKG_DIR}/bin"

          cp "dist/${{ matrix.output }}" "${PKG_DIR}/"
          cp "easytier-bin/${{ matrix.et_bin }}" "${PKG_DIR}/bin/"
          chmod +x "${PKG_DIR}/bin/${{ matrix.et_bin }}" 2>/dev/null || true

          echo "NetPanel beta-$(echo ${{ github.sha }} | cut -c1-7)" > "${PKG_DIR}/VERSION"
          echo "Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "${PKG_DIR}/VERSION"
          echo "Commit: ${{ github.sha }}" >> "${PKG_DIR}/VERSION"
          echo "Platform: ${{ matrix.goos }}/${{ matrix.goarch }}" >> "${PKG_DIR}/VERSION"
          echo "EasyTier: v${{ env.EASYTIER_VERSION }}" >> "${PKG_DIR}/VERSION"

          cd release
          if [ "${{ matrix.pkg_ext }}" = "zip" ]; then
            zip -r "${PKG_NAME}.zip" "${PKG_NAME}/"
          else
            tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}/"
          fi
          ls -lh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            release/*.tar.gz
            release/*.zip
          retention-days: 3

      - name: Publish to Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: "Beta Build (latest)"
          files: |
            release/*.tar.gz
            release/*.zip
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: false
          append_body: true
          body: |
            **提交**: ${{ github.sha }} | **构建时间**: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== 构建后端（macOS 原生编译）=====
  build-macos:
    name: Build (darwin-${{ matrix.goarch }})
    runs-on: macos-latest
    needs: [build-frontend, download-easytier]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            et_arch: x86_64
            output: netpanel
          - goarch: arm64
            et_arch: aarch64
            output: netpanel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download webpage dist
        uses: actions/download-artifact@v4
        with:
          name: webpage-dist
          path: backend/embed/dist/

      - name: Download EasyTier binary
        uses: actions/download-artifact@v4
        with:
          name: easytier-macos-${{ matrix.et_arch }}
          path: easytier-bin/

      - name: Tidy Go modules
        working-directory: backend
        run: GONOSUMCHECK=* GOFLAGS=-mod=mod go mod tidy

      - name: Build backend
        working-directory: backend
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          VERSION="beta-$(echo ${{ github.sha }} | cut -c1-7)"
          go build \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME}" \
            -o ../dist/${{ matrix.output }} .

      - name: Prepare release package
        run: |
          PKG_NAME="netpanel-darwin-${{ matrix.goarch }}"
          PKG_DIR="release/${PKG_NAME}"
          mkdir -p "${PKG_DIR}/bin"

          cp "dist/${{ matrix.output }}" "${PKG_DIR}/"
          cp "easytier-bin/easytier-core" "${PKG_DIR}/bin/"
          chmod +x "${PKG_DIR}/bin/easytier-core"

          echo "NetPanel beta-$(echo ${{ github.sha }} | cut -c1-7)" > "${PKG_DIR}/VERSION"
          echo "Built: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "${PKG_DIR}/VERSION"
          echo "Commit: ${{ github.sha }}" >> "${PKG_DIR}/VERSION"
          echo "Platform: darwin/${{ matrix.goarch }}" >> "${PKG_DIR}/VERSION"
          echo "EasyTier: v${{ env.EASYTIER_VERSION }}" >> "${PKG_DIR}/VERSION"

          cd release
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}/"
          ls -lh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-darwin-${{ matrix.goarch }}
          path: release/*.tar.gz
          retention-days: 3

      - name: Publish to Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: "Beta Build (latest)"
          files: release/*.tar.gz
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: false
          append_body: true
          body: |
            **提交**: ${{ github.sha }} | **构建时间**: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== 构建 Windows InnoSetup 安装包 =====
  build-inno-setup:
    name: Build Windows Installer (InnoSetup)
    runs-on: windows-latest
    needs: [build-linux-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: release-windows-amd64
          path: release-pkg/

      - name: Extract netpanel.exe from package
        shell: bash
        run: |
          mkdir -p dist
          # 解压 zip 包，提取 netpanel.exe
          cd release-pkg
          unzip -j netpanel-windows-amd64.zip "*/netpanel.exe" -d ../dist/ 2>/dev/null || \
          unzip -j netpanel-windows-amd64.zip "netpanel.exe" -d ../dist/ 2>/dev/null || true

          # 同时提取 EasyTier 二进制到 dist/bin/
          mkdir -p ../dist/bin
          unzip -j netpanel-windows-amd64.zip "*/bin/easytier-core.exe" -d ../dist/bin/ 2>/dev/null || true
          ls -la ../dist/

      - name: Set VERSION env
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "VERSION=beta-${SHORT_SHA}" >> $GITHUB_ENV

          # VersionInfoVersion 必须是 x.x.x.x 纯数字格式
          # 若 GITHUB_REF 是 tag（如 v1.2.3），提取数字部分；否则用 0.0.0
          RAW_TAG="${{ github.ref_name }}"
          if echo "${RAW_TAG}" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
            NUMERIC=$(echo "${RAW_TAG}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          else
            NUMERIC="0.0.0"
          fi
          echo "VERSION_NUMERIC=${NUMERIC}" >> $GITHUB_ENV
          echo "Building installer: VERSION=beta-${SHORT_SHA}, VERSION_NUMERIC=${NUMERIC}"

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: powershell
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          # 确认解压后的 netpanel.exe 存在（zip 包内文件名为 netpanel.exe）
          if (-not (Test-Path "dist\netpanel.exe")) {
            Write-Error "dist\netpanel.exe not found! Contents of dist/:"
            Get-ChildItem dist\ -ErrorAction SilentlyContinue
            exit 1
          }
          # setup.iss 引用的是 netpanel-windows-amd64.exe，创建副本
          Copy-Item "dist\netpanel.exe" "dist\netpanel-windows-amd64.exe" -Force
          # 确保 dist 目录存在
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # 运行 Inno Setup 编译器
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Installer built successfully:"
          Get-ChildItem dist\*.exe | Format-Table Name, Length

      - name: Generate installer checksum
        shell: bash
        run: |
          cd dist
          sha256sum NetPanel-Setup-*.exe >> SHA256SUMS-installer.txt || \
          certutil -hashfile NetPanel-Setup-*.exe SHA256 > SHA256SUMS-installer.txt
          cat SHA256SUMS-installer.txt

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: |
            dist/NetPanel-Setup-*.exe
            dist/SHA256SUMS-installer.txt
          retention-days: 3

      - name: Publish to Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: "Beta Build (latest)"
          files: |
            dist/NetPanel-Setup-*.exe
            dist/SHA256SUMS-installer.txt
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: false
          append_body: true
          body: |
            **提交**: ${{ github.sha }} | **构建时间**: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

