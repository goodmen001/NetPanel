  # ===== 构建 Electron 桌面应用（多平台）=====
  # 注意：此 job 独立运行，失败不影响 release-beta 主发布流程
  build-electron:
    name: Build Electron (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    needs: [build-linux-windows, build-macos]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            backend_artifact: release-windows-amd64
            backend_bin: netpanel.exe
            pkg_ext: zip
            electron_cmd: dist:win
            arch_label: windows-x64
          - os: macos
            runner: macos-latest
            backend_artifact: release-darwin-arm64
            backend_bin: netpanel
            pkg_ext: tar.gz
            electron_cmd: dist:mac
            arch_label: macos-arm64
          - os: linux
            runner: ubuntu-latest
            backend_artifact: release-linux-amd64
            backend_bin: netpanel
            pkg_ext: tar.gz
            electron_cmd: dist:linux
            arch_label: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Download backend binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.backend_artifact }}
          path: backend-pkg/

      - name: Extract backend binary
        shell: bash
        run: |
          mkdir -p desktop/resources
          cd backend-pkg

          # 解压对应格式的包
          if [ "${{ matrix.pkg_ext }}" = "zip" ]; then
            unzip -j *.zip "*/${{ matrix.backend_bin }}" -d ../desktop/resources/ 2>/dev/null || \
            unzip -j *.zip "${{ matrix.backend_bin }}" -d ../desktop/resources/ 2>/dev/null || true
          else
            tar -xzf *.tar.gz --wildcards "*/${{ matrix.backend_bin }}" --strip-components=1 -C ../desktop/resources/ 2>/dev/null || \
            tar -xzf *.tar.gz "${{ matrix.backend_bin }}" -C ../desktop/resources/ 2>/dev/null || true
          fi

          # 确认二进制存在并赋予执行权限
          ls -la ../desktop/resources/
          chmod +x ../desktop/resources/${{ matrix.backend_bin }} 2>/dev/null || true

      - name: Set VERSION env
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "VERSION=beta-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm ci

      - name: Build TypeScript
        working-directory: desktop
        run: npm run build

      - name: Build Electron package
        working-directory: desktop
        env:
          VERSION: ${{ env.VERSION }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 代码签名（可选，无证书时跳过）
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run ${{ matrix.electron_cmd }}

      - name: List output files
        shell: bash
        run: |
          echo "=== Electron build output ==="
          ls -lh desktop/dist/ 2>/dev/null || true

      - name: Collect Electron artifacts
        shell: bash
        run: |
          mkdir -p electron-release
          # 收集所有可能的 Electron 输出文件
          find desktop/dist/ -maxdepth 1 \( \
            -name "*.exe" -o -name "*.dmg" -o \
            -name "*.AppImage" -o -name "*.zip" -o \
            -name "*.tar.gz" \
          \) -exec cp {} electron-release/ \; 2>/dev/null || true
          echo "=== Collected files ==="
          ls -lh electron-release/ || echo "No files collected"

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-electron-${{ matrix.arch_label }}
          path: electron-release/
          retention-days: 3

      - name: Publish to Beta Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: "Beta Build (latest)"
          files: electron-release/*
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: false
          append_body: true
          body: |
            **提交**: ${{ github.sha }} | **构建时间**: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== 更新 Beta Release 说明（所有构建完成后刷新 body）=====
  # 等待所有 job，无论成功失败都运行，最终更新 Release 描述
  update-beta-body:
    name: Update Beta Release Body
    runs-on: ubuntu-latest
    needs: [build-linux-windows, build-macos, build-inno-setup, build-electron]
    if: always() && !cancelled()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Beta Release Body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: "Beta Build (latest)"
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            ## NetPanel Beta Build

            > ⚠️ 这是自动构建的测试版本，可能不稳定，请勿用于生产环境。

            **提交**: ${{ github.sha }}
            **版本**: `beta-${{ github.sha }}`
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            **提交信息**: ${{ github.event.head_commit.message }}

            ### 🖥️ 桌面应用（Electron，推荐新用户使用）

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows | `NetPanel-Desktop-*-windows-x64.exe` | NSIS 安装包，含服务管理 |
            | 🍎 macOS | `NetPanel-Desktop-*-macos-arm64.dmg` | DMG 安装包（Apple Silicon）|
            | 🐧 Linux | `NetPanel-Desktop-*-linux-x64.AppImage` | AppImage，无需安装依赖 |

            ### 📦 服务端（命令行/服务器部署）

            | 平台 | 架构 | 文件 | 说明 |
            |------|------|------|------|
            | 🪟 Windows | x86_64 | `NetPanel-Setup-*.exe` | **推荐** InnoSetup 安装向导，含服务注册 |
            | 🪟 Windows | x86_64 | `netpanel-windows-amd64.zip` | 便携版，手动部署 |
            | 🪟 Windows | ARM64 | `netpanel-windows-arm64.zip` | 便携版，手动部署 |
            | 🐧 Linux | x86_64 | `netpanel-linux-amd64.tar.gz` | glibc 动态链接 |
            | 🐧 Linux | ARM64 | `netpanel-linux-arm64.tar.gz` | glibc 动态链接 |
            | 🍎 macOS | Intel | `netpanel-darwin-amd64.tar.gz` | 需管理员权限 |
            | 🍎 macOS | Apple Silicon | `netpanel-darwin-arm64.tar.gz` | 需管理员权限 |

            ### 🚀 快速安装

            **Windows 桌面版**：下载 `NetPanel-Desktop-*-windows-x64.exe`，双击安装即可。

            **Windows 服务版**：下载 `NetPanel-Setup-*.exe`，以管理员身份运行安装向导。

            **Linux 一键安装（服务端）**：
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sudo bash
            ```

            **Linux 桌面版**：下载 `*.AppImage`，赋予执行权限后直接运行：
            ```bash
            chmod +x NetPanel-Desktop-*.AppImage && ./NetPanel-Desktop-*.AppImage
            ```

            ### 🔐 校验文件完整性

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}